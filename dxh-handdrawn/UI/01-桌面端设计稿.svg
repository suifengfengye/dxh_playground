  <text x="1294" y="65" fill="#FFFFFF" font-size="16" font-family="Arial, sans-serif" font-weight="700">导出占位</text>

  <rect x="24" y="120" width="360" height="860" rx="28" fill="#0F1428" stroke="#2A3358"/>
  <text x="56" y="170" fill="#F8FAFC" font-size="30" font-family="Arial, sans-serif" font-weight="700">输入创作意图</text>
  <text x="56" y="204" fill="#A8B0CC" font-size="18" font-family="Arial, sans-serif">一句话描述你想要的手绘过程视频</text>

  <rect x="56" y="236" width="296" height="188" rx="20" fill="#151B31" stroke="#36406D"/>
